server {
    listen 80;
    server_name narriq.cloud www.narriq.cloud;
    
    # تحويل تلقائي من HTTP إلى HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name narriq.cloud www.narriq.cloud;

    # مسار الشهادات (هذا هو المسار الذي وضعها فيه Certbot)
    ssl_certificate /etc/letsencrypt/live/narriq.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/narriq.cloud/privkey.pem;

    # إعدادات أمان إضافية (موصى بها)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    location /static/ {
        alias /app/static/; # الـ Nginx هيقرأ الـ static من هنا مباشرة
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }


    location / {
        proxy_pass http://web:8000; # أو المسار الذي يوجه لتطبيقك
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
